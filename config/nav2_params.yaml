---
# =========================
# NAV2 CORE
# =========================

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: carucior_asamblat/base_link
    odom_topic: /odom

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odom
    controller_frequency: 10.0
    controller_plugins:
      - FollowPath

    FollowPath:
      plugin: >-
        nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.4
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 1.2
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.2

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins:
      - GridBased

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: carucior_asamblat/base_link

smoother_server:
  ros__parameters:
    use_sim_time: true

route_server:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true

# =========================
# COSTMAPS
# =========================

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: carucior_asamblat/base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "scan"

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_min_range: 0.12
          obstacle_max_range: 12.0
          raytrace_min_range: 0.12
          raytrace_max_range: 12.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: carucior_asamblat/base_link
      rolling_window: true
      width: 20
      height: 20
      track_unknown_space: true
      resolution: 0.05
      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "scan"

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_min_range: 0.12
          obstacle_max_range: 12.0
          raytrace_min_range: 0.12
          raytrace_max_range: 12.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 3.0

# =========================
# COLLISION MONITOR
# =========================

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: carucior_asamblat/base_link
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_nav
    cmd_vel_out_topic: cmd_vel
    transform_tolerance: 0.2
    source_timeout: 0.5

    observation_sources:
      - scan

    scan:
      type: "scan"
      topic: /scan

    polygons:
      - StopZone

    StopZone:
      type: "polygon"
      action_type: "stop"
      min_points: 4
      # IMPORTANT: string, nu listă nested
      points: "[[0.35, 0.25], [0.35, -0.25], [0.0, -0.25], [0.0, 0.25]]"

# =========================
# OPENNAV DOCKING
# =========================

docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    dock_plugins:
      - simple_dock

    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      use_battery_status: false
      use_external_detection_pose: false
      docking_threshold: 0.05
      staging_x_offset: -0.7
      staging_yaw_offset: 0.0

    docks:
      - home_dock

    home_dock:
      type: "simple_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]
      id: "home"

# =========================
# LIFECYCLE MANAGER
# =========================

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor
      - route_server
