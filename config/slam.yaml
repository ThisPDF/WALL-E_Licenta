slam_toolbox:
  ros__parameters:
    use_sim_time: true
    scan_topic: /scan

    base_frame: carucior_asamblat/base_link
    odom_frame: odom
    map_frame: map

    # IMPORTANT: limitele LiDAR-ului tău
    min_laser_range: 0.12
    max_laser_range: 12.0

    # stabilitate
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    throttle_scans: 1
    queue_size: 100

    # necesar pt simulare gz
    minimum_time_interval: 0.1
