local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      footprint: "[[0.90, 0.40], [0.90, -0.40], [-0.45, -0.40], [-0.45, 0.40]]"
      resolution: 0.05
      rolling_window: true            # urmareste robotul
      width: 5
      height: 5

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          # /scan_filtered = self-filter (cart-ul eliminat). SLAM-ul foloseste
          # separat /scan_for_slam (nefiltrat, doar QoS convertit).
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.70

      always_send_full_costmap: true
