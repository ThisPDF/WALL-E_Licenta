slam_toolbox:
  ros__parameters:

    # --- Solver ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # --- Frames / topics (potrivit cu gazebo.launch.py + bridge) ---
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    # /scan_filtered = scan-ul cu rama caruciorului eliminata (output-ul
    # scan_qos_relay cu self-filter R=0.75m). Cu scan-ul brut SLAM adauga
    # "umbra" cart-ului in harta la fiecare unghi de rotatie a robotului,
    # poluand harta cu obstacole-fantoma. Walls/shelves/checkouts sunt la
    # 1-12m, mult inafara razei de filtrare → SLAM are features suficiente.
    scan_topic: /scan_filtered
    use_map_saver: true
    mode: mapping

    # --- Sim time ---
    use_sim_time: true

    # --- General ---
    debug_logging: false             # OFF — mai putin zgomot, e activ acum
    throttle_scans: 1
    # IMPORTANT: 0.1s = 10Hz pentru map->odom; previne "saritura" robotului
    # in RViz cand SLAM corecteaza poziția. Mai puține update-uri = mai stabil
    transform_publish_period: 0.1
    map_update_interval: 2.0         # /map la 2s — suficient, evita oscilatii
    resolution: 0.05
    max_laser_range: 12.0            # potrivit cu lidar (max 12.0 in URDF)
    minimum_time_interval: 0.3       # nu procesa scanuri prea des
    transform_timeout: 2.0
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    # --- Scan matching ---
    use_scan_matching: true
    use_scan_barycenter: true
    # Adauga nod nou doar dupa 0.2m/0.2rad — graph mai mic, drift mai mic.
    # Cu 0.0 (anterior) se adaugau noduri duplicate la fiecare scan → drift.
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    # 10.0m (anterior 3.0) — magazin mare + drift acumulat din wobble-ul
    # cart-ului face ca, la inchiderea buclei (final explorare), pozitia
    # estimata sa fie >3m de pozitia reala. Cu 3.0 SLAM nu gasea bucla →
    # crea harta duplicat. Cu 10.0 prinde bucla si corecteaza drift-ul.
    loop_search_maximum_distance: 10.0
    # Loop closing ON — esential cand robotul exploreaza mai multe minute
    # autonom (explore_lite). Fara asta, drift-ul de odom se acumuleaza la
    # fiecare tura si harta apare multipla / rotita. Snap-urile vizuale cand
    # detecteaza loop sunt acceptabile in raport cu drift-ul nelimitat.
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # --- Correlation ---
    # Wobble cart: base_footprint face cerc de ~0.42m raza in jurul centrului
    # fizic de rotatie (intre rotile din spate). Fereastra de cautare trebuie
    # sa acopere acest displacement intre scanuri consecutive, altfel SLAM
    # scan-matcher pierde matches → harta drifteaza/sare.
    # 1.0m (anterior 0.5) → acopera wobble-ul confortabil.
    correlation_search_space_dimension: 1.0
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # 12.0 (anterior 8.0) — fereastra de corelatie pentru loop matching
    # marita ca sa acopere drift-ul mai mare. Trebuie >= cu raza de cautare.
    loop_search_space_dimension: 12.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # --- Scan matcher ---
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
